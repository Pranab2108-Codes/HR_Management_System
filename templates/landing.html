<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --primary-hover: #1e293b;
            --surface: #ffffff;
            --background: #f8fafc;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--background);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,0.03) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.04) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.03) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .landing-container {
            width: 100%;
            max-width: 480px;
            animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .landing-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 3.5rem 3rem;
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.02),
                0 20px 25px -5px rgba(0, 0, 0, 0.03),
                0 0 0 1px rgba(0,0,0,0.02);
            text-align: center;
        }

        .brand-logo {
            margin-bottom: 1.5rem;
        }

        .company-name {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.75rem;
        }

        .quote-title {
            color: var(--text-main);
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.75rem;
        }

        .quote-subtitle {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 2.5rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-employee {
            background: var(--primary);
            color: white;
            border: 2px solid var(--primary);
        }

        .btn-employee:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.15);
        }

        .btn-admin {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--border);
        }

        .btn-admin:hover {
            border-color: #cbd5e1;
            background: #f8fafc;
            transform: translateY(-2px);
        }
        
        .watermark {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <div class="landing-card">
            <div class="brand-logo">
                <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Oditech Global Logo" style="width: 80px; height: 80px; border-radius: 18px; object-fit: cover; box-shadow: 0 8px 16px rgba(15, 23, 42, 0.12);">
            </div>
            <div class="company-name">Oditech Global Pvt. Ltd.</div>
            <h1 class="quote-title">Welcome to a new day</h1>
            <p class="quote-subtitle">Every day is a new opportunity. Let's build something great together.</p>
            
            <div class="btn-group">
                <a href="{{ url_for('login') }}" class="btn btn-employee">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Log in as Employee
                </a>
                <a href="{{ url_for('admin_login') }}" class="btn btn-admin">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Log in as Admin
                </a>
            </div>
        </div>
    </div>

    <div class="watermark">
        Made with ❤️ by Omkar
    </div>

</body>
</html>
